<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VPNHUB Admin Panel</title>

  <style>
    :root{
      --bg:#111827;
      --purple:#a855f7;
      --purple-dark:#7c3aed;
      --blue:#2563eb;
      --text:#ffffff;
      --muted:#d1d5db;
      --glass:rgba(255,255,255,.10);
      --border:rgba(216,180,254,.18);
      --shadow:0 28px 90px rgba(0,0,0,.34);
    }

    *{
      box-sizing:border-box;
    }

    html,
    body{
      margin:0;
      min-height:100%;
      background:
        radial-gradient(circle at 16% 12%, rgba(168,85,247,.28), transparent 30%),
        radial-gradient(circle at 86% 68%, rgba(37,99,235,.28), transparent 34%),
        linear-gradient(135deg,#111827 0%,#4c1d95 46%,#1e3a8a 100%);
      font-family:Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow-x:hidden;
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size:42px 42px;
      mask-image:linear-gradient(to bottom, black, transparent 88%);
      z-index:0;
    }

    .admin-shell{
      position:relative;
      z-index:1;
      min-height:100vh;
      padding:22px;
      display:grid;
      grid-template-rows:auto 1fr;
      gap:22px;
    }

    .admin-topbar{
      width:min(1180px,100%);
      margin:0 auto;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
      padding:16px 18px;
      border-radius:26px;
      border:1px solid var(--border);
      background:
        linear-gradient(
          135deg,
          rgba(255,255,255,.14),
          rgba(168,85,247,.10),
          rgba(37,99,235,.10)
        );
      backdrop-filter:blur(28px) saturate(190%);
      -webkit-backdrop-filter:blur(28px) saturate(190%);
      box-shadow:
        0 18px 50px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .admin-brand{
      display:flex;
      align-items:center;
      gap:14px;
      min-width:0;
    }

    .admin-logo{
      width:46px;
      height:46px;
      flex:0 0 auto;
      border-radius:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:white;
      font-weight:950;
      background:linear-gradient(135deg,var(--purple-dark),var(--blue));
      box-shadow:
        0 14px 34px rgba(124,58,237,.32),
        inset 0 1px 0 rgba(255,255,255,.18);
    }

    .admin-title-wrap{
      min-width:0;
    }

    .admin-title{
      margin:0;
      color:var(--text);
      font-size:1.15rem;
      line-height:1.1;
      font-weight:950;
      letter-spacing:-.025em;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    .admin-subtitle{
      margin:6px 0 0;
      color:rgba(255,255,255,.72);
      font-size:.86rem;
      line-height:1.35;
    }

    .admin-links{
      display:flex;
      align-items:center;
      gap:10px;
      flex:0 0 auto;
    }

    .admin-link{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:40px;
      padding:0 15px;
      border-radius:999px;
      color:white;
      text-decoration:none;
      font-size:.86rem;
      font-weight:850;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.08);
      backdrop-filter:blur(16px);
      -webkit-backdrop-filter:blur(16px);
      transition:.2s ease;
    }

    .admin-link:hover{
      background:rgba(168,85,247,.22);
      border-color:rgba(216,180,254,.24);
    }

    .admin-cms-card{
      width:min(1180px,100%);
      margin:0 auto;
      min-height:calc(100vh - 122px);
      border-radius:30px;
      overflow:hidden;
      border:1px solid var(--border);
      background:
        linear-gradient(
          135deg,
          rgba(17,24,39,.72),
          rgba(76,29,149,.22),
          rgba(30,58,138,.18)
        );
      backdrop-filter:blur(28px) saturate(190%);
      -webkit-backdrop-filter:blur(28px) saturate(190%);
      box-shadow:
        var(--shadow),
        inset 0 1px 0 rgba(255,255,255,.12);
    }

    #nc-root{
      min-height:calc(100vh - 122px);
      background:transparent;
    }

    /* Decap CMS polish */
    [class*="AppHeader"],
    [class*="Sidebar"],
    [class*="Toolbar"],
    [class*="CollectionTop"]{
      backdrop-filter:blur(18px) saturate(180%) !important;
      -webkit-backdrop-filter:blur(18px) saturate(180%) !important;
    }

    [class*="LoginPage"],
    [class*="AuthenticationPage"]{
      background:transparent !important;
    }

    [class*="LoginPage"] section,
    [class*="AuthenticationPage"] section{
      width:min(460px, calc(100vw - 32px)) !important;
      border-radius:26px !important;
      border:1px solid var(--border) !important;
      background:
        linear-gradient(
          135deg,
          rgba(31,41,55,.88),
          rgba(76,29,149,.36),
          rgba(30,58,138,.26)
        ) !important;
      backdrop-filter:blur(28px) saturate(190%) !important;
      -webkit-backdrop-filter:blur(28px) saturate(190%) !important;
      box-shadow:
        0 28px 90px rgba(0,0,0,.36),
        inset 0 1px 0 rgba(255,255,255,.14) !important;
    }

    a,
    button{
      transition:.2s ease !important;
    }

    button{
      border-radius:12px !important;
    }

    input,
    textarea,
    select{
      border-radius:12px !important;
      max-width:100%;
    }

    img,
    iframe{
      max-width:100%;
    }

    /* Tablet */
    @media(max-width:900px){
      .admin-shell{
        padding:16px;
        gap:16px;
      }

      .admin-topbar{
        border-radius:24px;
      }

      .admin-cms-card{
        border-radius:26px;
        min-height:calc(100vh - 112px);
      }

      #nc-root{
        min-height:calc(100vh - 112px);
      }
    }

    /* Mobile */
    @media(max-width:768px){
      .admin-shell{
        padding:12px;
        gap:12px;
      }

      .admin-topbar{
        align-items:flex-start;
        flex-direction:column;
        padding:14px;
        border-radius:22px;
      }

      .admin-brand{
        width:100%;
      }

      .admin-logo{
        width:40px;
        height:40px;
        border-radius:14px;
      }

      .admin-title{
        font-size:1rem;
      }

      .admin-subtitle{
        font-size:.78rem;
      }

      .admin-links{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
      }

      .admin-link{
        width:100%;
        min-height:38px;
        padding:0 12px;
        font-size:.8rem;
      }

      .admin-cms-card{
        border-radius:22px;
        min-height:calc(100vh - 170px);
        overflow:auto;
      }

      #nc-root{
        min-height:calc(100vh - 170px);
      }

      /* Decap CMS mobile safety */
      #nc-root,
      #nc-root *{
        max-width:100%;
      }

      [class*="EditorContainer"],
      [class*="PreviewPane"],
      [class*="ControlPane"],
      [class*="CollectionMain"],
      [class*="EntryEditor"]{
        max-width:100% !important;
      }
    }

    /* Small Mobile */
    @media(max-width:430px){
      .admin-shell{
        padding:10px;
      }

      .admin-topbar{
        border-radius:20px;
      }

      .admin-subtitle{
        display:none;
      }

      .admin-links{
        grid-template-columns:1fr;
      }

      .admin-cms-card{
        border-radius:20px;
        min-height:calc(100vh - 154px);
      }

      #nc-root{
        min-height:calc(100vh - 154px);
      }
    }
  </style>
</head>

<body>

  <main class="admin-shell">

    <header class="admin-topbar">

      <div class="admin-brand">
        <div class="admin-logo">VPN</div>

        <div class="admin-title-wrap">
          <h1 class="admin-title">VPNHUB Admin Panel</h1>
          <p class="admin-subtitle">
            Manage tutorials, videos, images, SEO, metadata, and publishing workflow.
          </p>
        </div>
      </div>

      <nav class="admin-links" aria-label="Admin quick links">
        <a class="admin-link" href="/" target="_blank" rel="noopener">
          View Site
        </a>

        <a class="admin-link" href="/tutorials/" target="_blank" rel="noopener">
          Tutorials
        </a>
      </nav>

    </header>

    <section class="admin-cms-card">
      <div id="nc-root"></div>
    </section>

  </main>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    CMS.registerPreviewStyle("/styles/global.css");

    CMS.registerEditorComponent({
      id: "responsiveImage",
      label: "Responsive Image",
      fields: [
        {
          name: "src",
          label: "Image",
          widget: "image"
        },
        {
          name: "alt",
          label: "Alt Text",
          widget: "string"
        },
        {
          name: "caption",
          label: "Caption",
          widget: "string",
          required: false
        }
      ],
      pattern: /^<figure class="article-image">\s*<img src="(.*)" alt="(.*)">\s*<figcaption>(.*)<\/figcaption>\s*<\/figure>$/s,
      fromBlock: function(match) {
        return {
          src: match[1],
          alt: match[2],
          caption: match[3]
        };
      },
      toBlock: function(data) {
        return `
<figure class="article-image">
  <img src="${data.src}" alt="${data.alt}">
  <figcaption>${data.caption || ""}</figcaption>
</figure>
        `.trim();
      },
      toPreview: function(data) {
        return `
<figure style="margin:24px 0;">
  <img src="${data.src}" alt="${data.alt}" style="width:100%;border-radius:18px;">
  <figcaption style="color:#94a3b8;text-align:center;margin-top:8px;">${data.caption || ""}</figcaption>
</figure>
        `;
      }
    });

    CMS.registerEditorComponent({
      id: "youtube",
      label: "YouTube Video",
      fields: [
        {
          name: "id",
          label: "YouTube Video ID",
          widget: "string"
        },
        {
          name: "title",
          label: "Video Title",
          widget: "string",
          required: false
        }
      ],
      pattern: /^<iframe class="youtube-video" src="https:\/\/www\.youtube\.com\/embed\/(.*)" title="(.*)" allowfullscreen><\/iframe>$/s,
      fromBlock: function(match) {
        return {
          id: match[1],
          title: match[2]
        };
      },
      toBlock: function(data) {
        return `<iframe class="youtube-video" src="https://www.youtube.com/embed/${data.id}" title="${data.title || "VPNHUB Video"}" allowfullscreen></iframe>`;
      },
      toPreview: function(data) {
        return `
<div style="aspect-ratio:16/9;background:#111827;border-radius:18px;display:flex;align-items:center;justify-content:center;color:white;">
  YouTube Video: ${data.id}
</div>
        `;
      }
    });
  </script>

</body>
</html>

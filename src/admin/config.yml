backend:
  name: git-gateway
  branch: main

local_backend: true

media_folder: "src/uploads"
public_folder: "/uploads"

site_url: "/"
display_url: "/"
logo_url: "/uploads/vpnhub-logo.png"

publish_mode: editorial_workflow

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "posts"
    label: "VPN Tutorials"
    label_singular: "VPN Tutorial"
    folder: "src/posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{category}}"
    preview_path: "posts/{{slug}}/"
    editor:
      preview: true

    sortable_fields:
      - "date"
      - "title"
      - "category"
      - "readTime"
      - "featured"
      - "difficulty"
      - "platform"

    view_filters:
      - label: "Pinned on Homepage"
        field: "featured"
        pattern: true

      - label: "Regular Tutorials"
        field: "featured"
        pattern: false

      - label: "Android VPN"
        field: "category"
        pattern: "Android VPN"

      - label: "iOS VPN"
        field: "category"
        pattern: "iOS VPN"

      - label: "Windows VPN"
        field: "category"
        pattern: "Windows VPN"

      - label: "Security"
        field: "category"
        pattern: "Security"

      - label: "Privacy"
        field: "category"
        pattern: "Privacy"

      - label: "Streaming"
        field: "category"
        pattern: "Streaming"

      - label: "Server Guide"
        field: "category"
        pattern: "Server Guide"

    fields:
      - label: "Layout"
        name: "layout"
        widget: "hidden"
        default: "post.njk"

      - label: "Tags"
        name: "tags"
        widget: "hidden"
        default:
          - "posts"

      - label: "Title"
        name: "title"
        widget: "string"
        hint: "Example: How to Set Up VPN in Hiddify"

      - label: "SEO Description"
        name: "description"
        widget: "text"
        hint: "Short description for Google and tutorial cards. Keep it between 40 and 180 characters."
        pattern:
          - "^.{40,180}$"
          - "Description should be between 40 and 180 characters."

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "Android VPN"
          - "iOS VPN"
          - "Windows VPN"
          - "Mac VPN"
          - "Router VPN"
          - "Security"
          - "Privacy"
          - "Streaming"
          - "Server Guide"
          - "Troubleshooting"
          - "Business"
          - "VPN Setup"

      - label: "Author"
        name: "author"
        widget: "string"
        default: "VPNHUB Team"

      - label: "Read Time"
        name: "readTime"
        widget: "string"
        default: "5 min read"
        hint: "Example: 5 min read"

      - label: "Featured Image"
        name: "image"
        widget: "image"
        required: false
        hint: "Recommended size: 1200x700 or larger."

      - label: "Featured / Pin to Homepage"
        name: "featured"
        widget: "boolean"
        default: false
        required: false
        hint: "Turn this ON to show this tutorial on homepage. Only the latest 3 featured tutorials will show first. If fewer than 3 are featured, latest normal posts fill the rest."

      - label: "Difficulty"
        name: "difficulty"
        widget: "select"
        default: "Beginner"
        options:
          - "Beginner"
          - "Intermediate"
          - "Advanced"

      - label: "Device / Platform"
        name: "platform"
        widget: "select"
        required: false
        options:
          - "Android"
          - "iOS"
          - "Windows"
          - "Mac"
          - "Router"
          - "Linux"
          - "Browser"
          - "All Devices"

      - label: "YouTube Video ID"
        name: "youtubeId"
        widget: "string"
        required: false
        hint: "Only paste the YouTube video ID, not the full URL."

      - label: "Table of Contents"
        name: "toc"
        widget: "list"
        required: false
        summary: "{{fields.item}}"
        field:
          label: "Section"
          name: "item"
          widget: "string"

      - label: "Article Body"
        name: "body"
        widget: "markdown"
        hint: "You can add images anywhere in the article body."

  - name: "videos"
    label: "Videos"
    label_singular: "Video"
    folder: "src/videos"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} — {{category}}"

    sortable_fields:
      - "date"
      - "title"
      - "category"

    fields:
      - label: "Title"
        name: "title"
        widget: "string"

      - label: "Description"
        name: "description"
        widget: "text"

      - label: "Publish Date"
        name: "date"
        widget: "datetime"
        date_format: "YYYY-MM-DD"
        time_format: false
        format: "YYYY-MM-DD"

      - label: "Category"
        name: "category"
        widget: "select"
        options:
          - "VPN Setup"
          - "Privacy"
          - "Streaming"
          - "Server Guide"
          - "Troubleshooting"
          - "Android VPN"
          - "iOS VPN"
          - "Windows VPN"

      - label: "YouTube Video ID"
        name: "youtubeId"
        widget: "string"
        hint: "Only paste the video ID. Example: dQw4w9WgXcQ"

      - label: "Thumbnail"
        name: "thumbnail"
        widget: "image"
        required: false

      - label: "Body"
        name: "body"
        widget: "markdown"
        required: false

  - name: "pages"
    label: "Page Text Settings"
    files:
      - label: "Website Page Texts"
        name: "site_content"
        file: "src/_data/siteContent.json"
        fields:
          - label: "Tutorials Page"
            name: "tutorialsPage"
            widget: "object"
            fields:
              - label: "Badge"
                name: "badge"
                widget: "string"

              - label: "Title Before Highlight"
                name: "titleBefore"
                widget: "string"
                hint: "Example: More VPN Tutorials,"

              - label: "Title Highlight"
                name: "titleHighlight"
                widget: "string"
                hint: "Example: Step by Step"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Section Title"
                name: "sectionTitle"
                widget: "string"

              - label: "Section Description"
                name: "sectionDescription"
                widget: "text"

          - label: "Videos Page"
            name: "videosPage"
            widget: "object"
            fields:
              - label: "Badge"
                name: "badge"
                widget: "string"

              - label: "Title Before Highlight"
                name: "titleBefore"
                widget: "string"

              - label: "Title Highlight"
                name: "titleHighlight"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Section Title"
                name: "sectionTitle"
                widget: "string"

              - label: "Section Description"
                name: "sectionDescription"
                widget: "text"

          - label: "About Page"
            name: "aboutPage"
            widget: "object"
            fields:
              - label: "Badge"
                name: "badge"
                widget: "string"

              - label: "Title Before Highlight"
                name: "titleBefore"
                widget: "string"

              - label: "Title Highlight"
                name: "titleHighlight"
                widget: "string"

              - label: "Description"
                name: "description"
                widget: "text"

              - label: "Main Card Title"
                name: "mainTitle"
                widget: "string"

              - label: "Main Paragraph One"
                name: "mainParagraphOne"
                widget: "text"

              - label: "Main Paragraph Two"
                name: "mainParagraphTwo"
                widget: "text"

              - label: "Mission Title"
                name: "missionTitle"
                widget: "string"

              - label: "Mission Text"
                name: "missionText"
                widget: "text"

              - label: "About Cards"
                name: "cards"
                widget: "list"
                min: 1
                max: 4
                fields:
                  - label: "Icon"
                    name: "icon"
                    widget: "string"
                    hint: "Emoji icon, example: 🛡️"

                  - label: "Title"
                    name: "title"
                    widget: "string"

                  - label: "Text"
                    name: "text"
                    widget: "text"
